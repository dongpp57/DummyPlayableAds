<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <title>Dummy Playable Ads · ZPS Studio</title>
  <style>
    /* ===== ZPS Brand Tokens ===== */
    :root {
      --zps-brand-red: #E8341A;
      --zps-brand-orange: #F5A623;
      --zps-brand-gradient: linear-gradient(135deg, #E8341A 0%, #F5A623 100%);

      --zps-bg-dark: #13151F;
      --zps-bg-surface: #252836;
      --zps-bg-elevated: #2E3148;

      --zps-accent-green: #00D68F;
      --zps-accent-purple: #7C4DFF;
      --zps-accent-blue: #4A90D9;

      --zps-text-primary: #FFFFFF;
      --zps-text-secondary: #8A8FA8;

      --shadow-card: 0 4px 16px rgba(0,0,0,0.3);
      --shadow-elev: 0 8px 28px rgba(0,0,0,0.4);
      --shadow-red:    0 8px 24px rgba(232,52,26,0.18);
      --shadow-purple: 0 8px 24px rgba(124,77,255,0.18);
      --shadow-blue:   0 8px 24px rgba(74,144,217,0.18);
      --shadow-green:  0 8px 24px rgba(0,214,143,0.18);

      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--zps-bg-dark);
      color: var(--zps-text-primary);
      font-family: 'Inter', 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Layout ===== */
    .topbar {
      background: var(--zps-bg-surface);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
    }
    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brand-name {
      font-size: 20px;
      font-weight: 800;
      background: var(--zps-brand-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.3px;
    }
    .brand-sub {
      font-size: 11px;
      font-weight: 600;
      color: var(--zps-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .btn-download-all {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      background: var(--zps-brand-gradient);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(232,52,26,0.35);
      transition: all 0.25s var(--ease-bounce);
    }
    .btn-download-all:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 10px 28px rgba(232,52,26,0.5);
    }
    .btn-download-all:active { transform: translateY(0) scale(0.98); }
    .btn-download-all:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-download-all svg {
      width: 18px;
      height: 18px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 32px 60px;
    }

    .page-header {
      margin-bottom: 36px;
    }
    .page-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 14px;
      color: var(--zps-text-secondary);
      font-weight: 400;
    }

    /* ===== Pillar Section ===== */
    .pillar {
      margin-bottom: 36px;
    }
    .pillar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .pillar-bar {
      width: 4px;
      height: 22px;
      border-radius: 2px;
    }
    .pillar-1 .pillar-bar { background: var(--zps-brand-red); }
    .pillar-2 .pillar-bar { background: var(--zps-accent-purple); }
    .pillar-3 .pillar-bar { background: var(--zps-accent-blue); }
    .pillar-legacy .pillar-bar { background: var(--zps-text-secondary); }

    .pillar-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--zps-text-secondary);
    }
    .pillar-count {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.06);
      color: var(--zps-text-secondary);
    }
    .btn-pillar-download {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.04);
      color: var(--zps-text-secondary);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s var(--ease-smooth);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .btn-pillar-download:hover {
      background: rgba(245,166,35,0.12);
      border-color: rgba(245,166,35,0.4);
      color: var(--zps-brand-orange);
    }
    .btn-pillar-download:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-pillar-download svg {
      width: 12px;
      height: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }

    /* ===== Scenario Card ===== */
    .card {
      background: var(--zps-bg-surface);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.04);
      padding: 20px 20px 18px;
      transition: all 0.25s var(--ease-smooth);
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--zps-brand-gradient);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      transform: translateY(-4px);
      background: var(--zps-bg-elevated);
      border-color: rgba(245,166,35,0.3);
    }
    .card:hover::before { opacity: 1; }
    .card.win:hover     { box-shadow: var(--shadow-green); }
    .card.lose:hover    { box-shadow: var(--shadow-red); }
    .card.demo:hover    { box-shadow: var(--shadow-purple); }
    .card.sort:hover    { box-shadow: var(--shadow-blue); }

    .card-header {
      min-height: 64px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-id-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-id {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.3px;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 9999px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-win   { background: rgba(0,214,143,0.15);   color: var(--zps-accent-green); }
    .badge-lose  { background: rgba(232,52,26,0.18);   color: var(--zps-brand-red); }
    .badge-demo  { background: rgba(124,77,255,0.18);  color: var(--zps-accent-purple); }
    .badge-sort  { background: rgba(74,144,217,0.18);  color: var(--zps-accent-blue); }
    .badge-proto { background: rgba(138,143,168,0.18); color: var(--zps-text-secondary); }

    .card-name {
      font-size: 13px;
      color: var(--zps-text-secondary);
      line-height: 1.5;
      font-weight: 400;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 11px 0;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.2s var(--ease-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn svg {
      width: 14px;
      height: 14px;
    }
    .btn-view {
      background: var(--zps-brand-gradient);
      color: #fff;
      box-shadow: 0 4px 12px rgba(232,52,26,0.25);
    }
    .btn-view:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(232,52,26,0.4);
    }
    .btn-view:active { transform: translateY(0) scale(0.97); }

    .btn-download {
      background: rgba(255,255,255,0.06);
      color: var(--zps-text-primary);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-download:hover {
      background: rgba(245,166,35,0.12);
      border-color: rgba(245,166,35,0.35);
      color: var(--zps-brand-orange);
    }
    .btn-download:active { transform: scale(0.97); }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: var(--zps-text-secondary);
      font-size: 12px;
      font-weight: 400;
    }
    .footer-brand {
      color: var(--zps-brand-orange);
      font-weight: 600;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--zps-bg-elevated);
      color: #fff;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow-elev);
      border: 1px solid rgba(245,166,35,0.3);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s var(--ease-bounce);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(245,166,35,0.3);
      border-top-color: var(--zps-brand-orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .topbar { padding: 14px 18px; }
      .container { padding: 24px 18px 40px; }
      .page-title { font-size: 22px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .btn-download-all { padding: 10px 16px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/zps_fox.png" alt="ZPS Studio" />
      <div class="brand-text">
        <div class="brand-name">ZPS Studio</div>
        <div class="brand-sub">Playable Ads Hub</div>
      </div>
    </div>
    <button class="btn-download-all" id="downloadAllBtn">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Download All (.zip)
    </button>
  </header>

  <div class="container">
    <div class="page-header">
      <div class="page-title">Dummy Playable Ads</div>
      <div class="page-subtitle">11 scenarios · 640 × 1136 portrait · 20s timer · PixiJS v8 + Vite</div>
    </div>

    <section class="pillar pillar-1">
      <div class="pillar-header">
        <div class="pillar-bar"></div>
        <div class="pillar-title">Pillar 1 · Score Reward / Penalty</div>
        <div class="pillar-count" id="count-1">0</div>
        <button class="btn-pillar-download" data-pillar="pillar-1" data-name="pillar-1-score-penalty">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download zip
        </button>
      </div>
      <div class="grid" id="pillar-1"></div>
    </section>

    <section class="pillar pillar-2">
      <div class="pillar-header">
        <div class="pillar-bar"></div>
        <div class="pillar-title">Pillar 2 · Action Variety</div>
        <div class="pillar-count" id="count-2">0</div>
        <button class="btn-pillar-download" data-pillar="pillar-2" data-name="pillar-2-action-variety">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download zip
        </button>
      </div>
      <div class="grid" id="pillar-2"></div>
    </section>

    <section class="pillar pillar-3">
      <div class="pillar-header">
        <div class="pillar-bar"></div>
        <div class="pillar-title">Pillar 3 · Card Sorting</div>
        <div class="pillar-count" id="count-3">0</div>
        <button class="btn-pillar-download" data-pillar="pillar-3" data-name="pillar-3-card-sorting">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download zip
        </button>
      </div>
      <div class="grid" id="pillar-3"></div>
    </section>

    <section class="pillar pillar-legacy">
      <div class="pillar-header">
        <div class="pillar-bar"></div>
        <div class="pillar-title">Legacy</div>
        <div class="pillar-count" id="count-legacy">0</div>
        <button class="btn-pillar-download" data-pillar="pillar-legacy" data-name="pillar-legacy">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download zip
        </button>
      </div>
      <div class="grid" id="pillar-legacy"></div>
    </section>

    <div class="footer">
      Built with <span class="footer-brand">PixiJS v8 + Vite</span> · Dummy ZingPlay Thailand
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="spinner"></div>
    <span id="toastText">Preparing files...</span>
  </div>

  <script>
    const SCENARIOS = {
      'pillar-1': [
        { id: 's1-v1',  name: 'Win: Grab the open card (+50)',             badge: 'win',  badgeText: 'WIN' },
        { id: 's2a-v1', name: 'Pain: Free-tap, opponent grabs open (-50)', badge: 'lose', badgeText: 'LOSE' },
        { id: 's2b-v1', name: 'Watch the trap: Auto-play warning',         badge: 'demo', badgeText: 'DEMO' },
        { id: 's3-v1',  name: 'Win: Grab the Spe-to (+50)',                badge: 'win',  badgeText: 'WIN' },
      ],
      'pillar-2': [
        { id: 's4-v1',  name: 'Win: Grab + knock instantly',               badge: 'win',  badgeText: 'WIN' },
        { id: 's5a-v1', name: 'Pain: Opponent grabs + knock (-50)',        badge: 'lose', badgeText: 'LOSE' },
        { id: 's6-v1',  name: 'Win: Grab 1 meld → lay off all cards',      badge: 'win',  badgeText: 'WIN' },
      ],
      'pillar-3': [
        { id: 's7-v1', name: 'Sort cards into 2 valid melds (drag)',       badge: 'sort', badgeText: 'SORT' },
        { id: 's8-v1', name: 'Sort beautiful hand → instant win',          badge: 'sort', badgeText: 'SORT' },
        { id: 's9-v1', name: 'Deduce: Pick the right card → multi-meld',   badge: 'sort', badgeText: 'SORT' },
      ],
      'pillar-legacy': [
        { id: '1-1', name: 'Original sort prototype', badge: 'proto', badgeText: 'PROTO' },
      ],
    };

    function el(tag, opts = {}) {
      const node = document.createElement(tag);
      if (opts.className) node.className = opts.className;
      if (opts.text != null) node.textContent = opts.text;
      if (opts.href != null) node.setAttribute('href', opts.href);
      if (opts.target) node.setAttribute('target', opts.target);
      if (opts.rel) node.setAttribute('rel', opts.rel);
      if (opts.download != null) node.setAttribute('download', opts.download);
      if (opts.html) node.insertAdjacentHTML('beforeend', opts.html); // only for trusted SVG strings
      return node;
    }

    const ICON_VIEW = '<svg viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>';
    const ICON_DOWNLOAD = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function makeBtn(className, label, href, download) {
      const a = el('a', { className: 'btn ' + className, href: href });
      if (download) a.setAttribute('download', download);
      else { a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener'); }
      // SVG icons are static literals (no user data) — safe to inject
      a.insertAdjacentHTML('afterbegin', className === 'btn-view' ? ICON_VIEW : ICON_DOWNLOAD);
      a.appendChild(document.createTextNode(label));
      return a;
    }

    function renderCard(s) {
      const distHref = 'dist/index-' + s.id + '.html';
      const filename = 'dummy-playable-' + s.id + '.html';

      const card = el('div', { className: 'card ' + s.badge });

      const header = el('div', { className: 'card-header' });
      const idRow = el('div', { className: 'card-id-row' });
      idRow.appendChild(el('div', { className: 'card-id', text: s.id.toUpperCase() }));
      idRow.appendChild(el('span', { className: 'badge badge-' + s.badge, text: s.badgeText }));
      header.appendChild(idRow);
      header.appendChild(el('div', { className: 'card-name', text: s.name }));

      const btnRow = el('div', { className: 'btn-row' });
      btnRow.appendChild(makeBtn('btn-view', 'View', distHref));
      btnRow.appendChild(makeBtn('btn-download', 'Download', distHref, filename));

      card.appendChild(header);
      card.appendChild(btnRow);
      return card;
    }

    Object.entries(SCENARIOS).forEach(function (entry) {
      const pillarId = entry[0];
      const items = entry[1];
      const grid = document.getElementById(pillarId);
      if (!grid) return;
      items.forEach(function (s) { grid.appendChild(renderCard(s)); });
      const countEl = document.getElementById('count-' + pillarId.replace('pillar-', ''));
      if (countEl) countEl.textContent = items.length;
    });

    // ===== Download All as ZIP =====
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toastText');
    function showToast(text) {
      toastText.textContent = text;
      toast.classList.add('show');
    }
    function hideToast(delay) {
      setTimeout(function () { toast.classList.remove('show'); }, delay || 0);
    }

    function loadJSZip() {
      return new Promise(function (resolve, reject) {
        if (window.JSZip) return resolve(window.JSZip);
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
        script.onload = function () { resolve(window.JSZip); };
        script.onerror = function () { reject(new Error('Failed to load JSZip')); };
        document.head.appendChild(script);
      });
    }

    /**
     * Shared zip builder used by both "Download All" and per-pillar buttons.
     * scenarios: array of scenario objects
     * folderName: both the zip folder name and the output file name stem
     * triggerBtn: button to disable during download
     */
    async function downloadScenariosAsZip(scenarios, folderName, triggerBtn) {
      if (triggerBtn) triggerBtn.disabled = true;
      showToast('Loading ZIP library...');
      try {
        const JSZip = await loadJSZip();
        const zip = new JSZip();
        const folder = zip.folder(folderName);

        for (let i = 0; i < scenarios.length; i++) {
          const s = scenarios[i];
          showToast('Fetching ' + (i + 1) + '/' + scenarios.length + '  ·  ' + s.id);
          const url = 'dist/index-' + s.id + '.html';
          try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const html = await res.text();
            folder.file('dummy-playable-' + s.id + '.html', html);
          } catch (e) {
            console.warn('Skip ' + s.id + ':', e.message);
          }
        }

        showToast('Compressing...');
        const blob = await zip.generateAsync({
          type: 'blob',
          compression: 'DEFLATE',
          compressionOptions: { level: 6 },
        });

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = folderName + '.zip';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showToast('Done · ' + scenarios.length + ' files zipped');
        hideToast(2200);
      } catch (e) {
        console.error(e);
        showToast('Error: ' + e.message);
        hideToast(3000);
      } finally {
        if (triggerBtn) triggerBtn.disabled = false;
      }
    }

    // ===== Download All =====
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    downloadAllBtn.addEventListener('click', function () {
      const allScenarios = [].concat(
        SCENARIOS['pillar-1'],
        SCENARIOS['pillar-2'],
        SCENARIOS['pillar-3'],
        SCENARIOS['pillar-legacy']
      );
      downloadScenariosAsZip(allScenarios, 'dummy-playable-ads', downloadAllBtn);
    });

    // ===== Per-pillar Download =====
    document.querySelectorAll('.btn-pillar-download').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const pillarId = btn.getAttribute('data-pillar');
        const folderName = btn.getAttribute('data-name') || pillarId;
        const items = SCENARIOS[pillarId] || [];
        if (items.length === 0) return;
        downloadScenariosAsZip(items, folderName, btn);
      });
    });
  </script>
</body>
</html>
